<svg width="100%" viewBox="0 0 460 230" xmlns="http://www.w3.org/2000/svg" role="img">
  <title>Varun N – System Info</title>
  <desc>Terminal-style system info card showing OS, Uptime, Host, Kernel, IDE, OpenTo, and Location</desc>

  <defs>
    <style>
      text { font-family: 'JetBrains Mono', 'Courier New', monospace; }
      .key { fill: #f0883e; font-size: 11px; }
      .val { fill: #c9d1d9; font-size: 11px; }
      .hl  { fill: #56d364; }
      .hl2 { fill: #79c0ff; }
      .hl3 { fill: #a371f7; }
      .label { fill: #8b949e; font-size: 9px; letter-spacing: 1.2px; font-weight: 600; }
      .prompt { fill: #3fb950; font-size: 11px; }
      .cmd    { fill: #79c0ff; font-size: 11px; }
      .title  { fill: #8b949e; font-size: 10px; }
    </style>
  </defs>

  <!-- Card background -->
  <rect width="460" height="230" rx="12" fill="#0d1117" stroke="#21262d" stroke-width="1"/>

  <!-- Top bar -->
  <rect width="460" height="34" rx="12" fill="#161b22"/>
  <rect y="22" width="460" height="12" fill="#161b22"/>
  <rect y="34" width="460" height="1" fill="#21262d"/>

  <!-- Traffic lights -->
  <circle cx="18" cy="17" r="5" fill="#ff5f57"/>
  <circle cx="34" cy="17" r="5" fill="#febc2e"/>
  <circle cx="50" cy="17" r="5" fill="#28c840"/>

  <!-- Terminal title -->
  <text x="72" y="21" class="title">varun --status</text>

  <!-- Prompt line -->
  <text x="20" y="62">
    <tspan class="prompt">varun</tspan>
    <tspan class="val"> ~ </tspan>
    <tspan class="cmd">$ varun --status</tspan>
  </text>

  <!-- Data rows -->
  <!-- OS -->
  <text x="20" y="85"><tspan class="key">OS:      </tspan><tspan class="hl" dx="4">Ubuntu 24</tspan><tspan class="val"> / Android 13</tspan></text>
  <!-- Uptime -->
  <text x="20" y="103"><tspan class="key">Uptime:  </tspan><tspan class="val" dx="4">22 Years, 6 Months</tspan></text>
  <!-- Host -->
  <text x="20" y="121"><tspan class="key">Host:    </tspan><tspan class="hl2" dx="4">SRM Institute of Science and Technology</tspan></text>
  <!-- Kernel -->
  <text x="20" y="139"><tspan class="key">Kernel:  </tspan><tspan class="hl3" dx="4">CS Junior</tspan><tspan class="val"> (AI &amp; ML Focus)</tspan></text>
  <!-- IDE -->
  <text x="20" y="157"><tspan class="key">IDE:     </tspan><tspan class="val" dx="4">VSCode 1.111.0</tspan></text>
  <!-- OpenTo -->
  <text x="20" y="175"><tspan class="key">OpenTo:  </tspan><tspan class="hl" dx="4">Internships</tspan><tspan class="val"> &amp; OSS Contributions</tspan></text>
  <!-- Loc -->
  <text x="20" y="193"><tspan class="key">Loc:     </tspan><tspan class="val" dx="4">Chennai, TN 🇮🇳</tspan></text>

  <!-- Divider -->
  <line x1="20" y1="208" x2="440" y2="208" stroke="#21262d" stroke-width="1"/>

  <!-- Footer label -->
  <text x="20" y="222" class="label">SYSTEM INFO · VARUN-N7</text>
</svg>
