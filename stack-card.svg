<svg width="100%" viewBox="0 0 460 200" xmlns="http://www.w3.org/2000/svg" role="img">
  <title>Varun N – The Stack</title>
  <desc>Bento-style card showing Core Tech, ML Toolkit, and Environment badges</desc>

  <defs>
    <style>
      text { font-family: 'JetBrains Mono', 'Courier New', monospace; }
      .section-label { fill: #8b949e; font-size: 9px; letter-spacing: 1.2px; font-weight: 600; }
      .badge-text { font-size: 10px; font-weight: 600; }
      .title  { fill: #8b949e; font-size: 10px; }
    </style>
  </defs>

  <!-- Card background -->
  <rect width="460" height="200" rx="12" fill="#0d1117" stroke="#21262d" stroke-width="1"/>

  <!-- Top bar -->
  <rect width="460" height="34" rx="12" fill="#161b22"/>
  <rect y="22" width="460" height="12" fill="#161b22"/>
  <rect y="34" width="460" height="1" fill="#21262d"/>
  <circle cx="18" cy="17" r="5" fill="#ff5f57"/>
  <circle cx="34" cy="17" r="5" fill="#febc2e"/>
  <circle cx="50" cy="17" r="5" fill="#28c840"/>
  <text x="72" y="21" class="title">varun --stack</text>

  <!-- SECTION: Core Tech -->
  <circle cx="28" cy="60" r="3" fill="#58a6ff"/>
  <text x="38" y="64" class="section-label">CORE TECH</text>

  <!-- Python badge -->
  <rect x="20" y="72" width="60" height="20" rx="5" fill="#1f3a5f" stroke="#1f6feb" stroke-width="1"/>
  <text x="50" y="86" text-anchor="middle" class="badge-text" fill="#79c0ff">Python</text>

  <!-- Go badge -->
  <rect x="86" y="72" width="42" height="20" rx="5" fill="#0d2d2d" stroke="#196c2e" stroke-width="1"/>
  <text x="107" y="86" text-anchor="middle" class="badge-text" fill="#56d364">Go</text>

  <!-- C++ badge -->
  <rect x="134" y="72" width="42" height="20" rx="5" fill="#1c1f3a" stroke="#6e40c9" stroke-width="1"/>
  <text x="155" y="86" text-anchor="middle" class="badge-text" fill="#a371f7">C++</text>

  <!-- Java badge -->
  <rect x="182" y="72" width="44" height="20" rx="5" fill="#2d1a00" stroke="#9e4d08" stroke-width="1"/>
  <text x="204" y="86" text-anchor="middle" class="badge-text" fill="#f0883e">Java</text>

  <!-- SECTION: ML Toolkit -->
  <circle cx="28" cy="112" r="3" fill="#a371f7"/>
  <text x="38" y="116" class="section-label">ML TOOLKIT</text>

  <!-- NumPy -->
  <rect x="20" y="123" width="58" height="20" rx="5" fill="#0d2d2d" stroke="#196c2e" stroke-width="1"/>
  <text x="49" y="137" text-anchor="middle" class="badge-text" fill="#56d364">NumPy</text>

  <!-- Pandas -->
  <rect x="84" y="123" width="60" height="20" rx="5" fill="#1c1f3a" stroke="#6e40c9" stroke-width="1"/>
  <text x="114" y="137" text-anchor="middle" class="badge-text" fill="#a371f7">Pandas</text>

  <!-- Matplotlib -->
  <rect x="150" y="123" width="84" height="20" rx="5" fill="#1a1a2e" stroke="#1f6feb" stroke-width="1"/>
  <text x="192" y="137" text-anchor="middle" class="badge-text" fill="#79c0ff">Matplotlib</text>

  <!-- SECTION: Environment -->
  <circle cx="28" cy="163" r="3" fill="#3fb950"/>
  <text x="38" y="167" class="section-label">ENVIRONMENT</text>

  <!-- Fedora -->
  <rect x="20" y="174" width="58" height="20" rx="5" fill="#1f3a5f" stroke="#1f6feb" stroke-width="1"/>
  <text x="49" y="188" text-anchor="middle" class="badge-text" fill="#79c0ff">Fedora</text>

  <!-- VS Code -->
  <rect x="84" y="174" width="66" height="20" rx="5" fill="#0d2d2d" stroke="#196c2e" stroke-width="1"/>
  <text x="117" y="188" text-anchor="middle" class="badge-text" fill="#56d364">VS Code</text>

  <!-- Git -->
  <rect x="156" y="174" width="42" height="20" rx="5" fill="#2d1a00" stroke="#9e4d08" stroke-width="1"/>
  <text x="177" y="188" text-anchor="middle" class="badge-text" fill="#f0883e">Git</text>
</svg>
